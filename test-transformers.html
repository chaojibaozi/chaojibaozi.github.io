<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Transformers.js 测试诊断</title>
    <style>
        body { font-family: system-ui, sans-serif; padding: 20px; background: #f8fafc; }
        h1 { font-size: 20px; color: #1e293b; }
        #status { padding: 12px 16px; border-radius: 8px; font-size: 16px; margin: 10px 0; }
        .ok { background: #d4edda; color: #155724; }
        .err { background: #f8d7da; color: #721c24; }
        .warn { background: #fff3cd; color: #856404; }
        #log { background: #1e293b; color: #e2e8f0; padding: 16px; border-radius: 8px; font-size: 13px; font-family: 'Cascadia Code', monospace; min-height: 200px; overflow: auto; white-space: pre-wrap; line-height: 1.6; }
        .info { color: #38bdf8; }
        .error { color: #f87171; }
        .success { color: #4ade80; }
        .dim { color: #94a3b8; }
    </style>
</head>
<body>
    <h1>Transformers.js 模型加载诊断</h1>
    <div id="status" class="warn">⏳ 初始化中...</div>
    <pre id="log"></pre>
    <div style="margin-top:12px;display:flex;gap:8px;">
        <button onclick="location.reload()" style="padding:8px 16px;border-radius:6px;border:1px solid #cbd5e1;background:white;cursor:pointer;font-family:inherit;">🔄 重新测试</button>
        <a href="/" style="padding:8px 16px;border-radius:6px;border:1px solid #667eea;background:#667eea;color:white;text-decoration:none;font-size:14px;">← 返回首页</a>
    </div>

    <script type="module">
        const log = document.getElementById('log');
        const status = document.getElementById('status');

        function logMsg(text, type) {
            const cls = type === 'error' ? 'error' : type === 'success' ? 'success' : type === 'info' ? 'info' : 'dim';
            log.textContent += `[${new Date().toLocaleTimeString()}] `;
            log.innerHTML += `<span class="${cls}">${text}</span>\n`;
            log.scrollTop = log.scrollHeight;
        }

        async function runDiagnostic() {
            try {
                logMsg('=== 开始诊断 ===', 'info');
                logMsg('浏览器: ' + navigator.userAgent, 'dim');

                // 1. 检查 WebAssembly 支持
                logMsg('检查 WebAssembly 支持...', 'info');
                if (typeof WebAssembly === 'object' && typeof WebAssembly.instantiate === 'function') {
                    logMsg('✓ WebAssembly 支持', 'success');
                } else {
                    logMsg('✗ WebAssembly 不支持', 'error');
                    throw new Error('浏览器不支持 WebAssembly');
                }

                // 1.5 检查 SharedArrayBuffer 支持（COOP/COEP 头必须开启）
                logMsg('检查 SharedArrayBuffer...', 'info');
                if (typeof SharedArrayBuffer === 'undefined') {
                    logMsg('✗ SharedArrayBuffer 不可用 (缺少COOP/COEP响应头)', 'error');
                    throw new Error('SharedArrayBuffer 不可用，请使用 python server.py 启动服务');
                }
                logMsg('✓ SharedArrayBuffer 支持', 'success');

                // 2. 加载 transformers.js
                logMsg('加载 @huggingface/transformers v3...', 'info');
                const { env, pipeline } = await import('https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.7.2/+esm');
                logMsg('✓ transformers.js 加载成功', 'success');

                // 3. 配置 ONNX WASM 路径（使用 onnxruntime-web 的标准 WASM 文件，版本需匹配）
                if (env.backends && env.backends.onnx && env.backends.onnx.wasm) {
                    env.backends.onnx.wasm.wasmPaths = 'https://cdn.jsdelivr.net/npm/onnxruntime-web@1.22.0-dev.20250409-89f8206ba4/dist/';
                    logMsg('  ONNX WASM 路径已配置', 'success');
                }

                // 4. 尝试本地加载
                env.localModelPath = '/models/';
                env.allowRemoteModels = true;
                env.allowLocalModels = true;
                logMsg('配置: localModelPath=/models/, allowRemoteModels=true', 'info');

                // 5. 加载模型
                logMsg('正在加载模型 all-MiniLM-L6-v2 (Q8量化, ~22MB)...', 'info');
                status.textContent = '⏳ 正在加载模型...';
                status.className = 'warn';

                const pipe = await pipeline('feature-extraction', 'Xenova/all-MiniLM-L6-v2', { quantized: true });
                logMsg('✓ 模型加载成功!', 'success');
                logMsg('  ▸ 模型类型: feature-extraction', 'success');
                logMsg('  ▸ 模型大小: ~22MB (Q8量化)', 'success');

                // 6. 测试推理
                logMsg('测试推理...', 'info');
                const result = await pipe('抠图', { pooling: 'mean', normalize: true });
                logMsg('✓ 推理成功! 向量维度: ' + result.data.length, 'success');
                logMsg('  前5个值: ' + Array.from(result.data.slice(0, 5)).map(v => v.toFixed(4)).join(', '), 'dim');

                // 7. 相似度测试
                logMsg('测试语义相似度...', 'info');
                const texts = ['去掉背景', '抠图', '分析搜索词'];
                const vecs = await Promise.all(texts.map(t => pipe(t, { pooling: 'mean', normalize: true })));
                function sim(a, b) { let d=0,na=0,nb=0; for(let i=0;i<a.data.length;i++){d+=a.data[i]*b.data[i];na+=a.data[i]*a.data[i];nb+=b.data[i]*b.data[i];} return d/(Math.sqrt(na)*Math.sqrt(nb)); }
                logMsg('  "去掉背景" ↔ "抠图": ' + sim(vecs[0], vecs[1]).toFixed(4) + ' (期望 >0.5)', 'success');
                logMsg('  "去掉背景" ↔ "分析搜索词": ' + sim(vecs[0], vecs[2]).toFixed(4) + ' (期望 <0.5)', 'success');
                logMsg('  "抠图" ↔ "分析搜索词": ' + sim(vecs[1], vecs[2]).toFixed(4) + ' (期望 <0.5)', 'success');

                status.textContent = '✓ AI模型就绪! 可以输入"帮我抠图"等自然语言';
                status.className = 'ok';

            } catch (err) {
                logMsg('❌ 诊断失败: ' + err.message, 'error');
                logMsg('  堆栈: ' + (err.stack || '').split('\n').slice(0, 5).join('\n  '), 'error');
                status.textContent = '❌ 加载失败: ' + err.message;
                status.className = 'err';
            }
        }

        runDiagnostic();
    </script>
</body>
</html>
