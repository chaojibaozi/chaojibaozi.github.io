<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Transformers.js 本地模型测试</title>
</head>
<body>
    <h1>Transformers.js 本地模型测试</h1>
    <div id="status" style="font-size:18px;padding:10px;border-radius:4px;">⏳ 初始化中...</div>
    <pre id="log" style="background:#f5f5f5;padding:10px;margin-top:10px;min-height:300px;font-size:13px;overflow:auto;"></pre>

    <script type="module">
        const log = document.getElementById('log');
        const status = document.getElementById('status');

        function addLog(msg, isError) {
            const color = isError ? 'red' : 'inherit';
            log.innerHTML += '<span style="color:' + color + '">[' + new Date().toLocaleTimeString() + '] ' + msg + '</span>\n';
        }

        try {
            addLog('开始加载 @huggingface/transformers v3...');

            const { env, pipeline } = await import('https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.7.2');
            addLog('✓ transformers 库加载成功!');
            addLog('  env.localModelPath = ' + env.localModelPath);
            addLog('  env.allowRemoteModels = ' + env.allowRemoteModels);
            addLog('  env.remoteHost = ' + env.remoteHost);

            // ========== 配置本地模型路径 ==========
            env.localModelPath = '/models/';
            env.allowRemoteModels = false;
            addLog('✓ 已配置本地模式: localModelPath=/models/, allowRemoteModels=false');
            addLog('');

            // ========== 加载 feature-extraction pipeline ==========
            addLog('⏳ 正在加载模型: Xenova/all-MiniLM-L6-v2 (本地, 22MB)...');
            status.textContent = '⏳ 正在加载模型 (22MB)...';
            status.style.background = '#fff3cd';

            const pipe = await pipeline('feature-extraction', 'Xenova/all-MiniLM-L6-v2', {
                quantized: true,
            });

            addLog('✓ 模型加载成功!');
            status.textContent = '✓ 模型已就绪';
            status.style.background = '#d4edda';
            addLog('');

            // ========== 测试推理 ==========
            addLog('⏳ 测试文本向量化...');
            const result = await pipe('抠图', { pooling: 'mean', normalize: true });
            addLog('✓ 推理成功!');
            addLog('  输出类型: ' + result.type);
            addLog('  向量维度: ' + result.data.length);
            addLog('  前10个值: ' + Array.from(result.data.slice(0, 10)).map(v => v.toFixed(4)).join(', '));
            addLog('');

            // ========== 测试语义相似度 ==========
            addLog('⏳ 测试语义相似度...');

            // 计算两个句子的向量
            const [vec1, vec2, vec3] = await Promise.all([
                pipe('去掉背景', { pooling: 'mean', normalize: true }),
                pipe('抠图', { pooling: 'mean', normalize: true }),
                pipe('分析搜索词', { pooling: 'mean', normalize: true }),
            ]);

            // 计算余弦相似度
            function cosineSimilarity(a, b) {
                let dot = 0, na = 0, nb = 0;
                for (let i = 0; i < a.data.length; i++) {
                    dot += a.data[i] * b.data[i];
                    na += a.data[i] * a.data[i];
                    nb += b.data[i] * b.data[i];
                }
                return dot / (Math.sqrt(na) * Math.sqrt(nb));
            }

            const sim12 = cosineSimilarity(vec1, vec2);
            const sim13 = cosineSimilarity(vec1, vec3);
            const sim23 = cosineSimilarity(vec2, vec3);

            addLog('"去掉背景" vs "抠图": ' + sim12.toFixed(4) + ' ← 应该接近');
            addLog('"去掉背景" vs "分析搜索词": ' + sim13.toFixed(4) + ' ← 应该较远');
            addLog('"抠图" vs "分析搜索词": ' + sim23.toFixed(4) + ' ← 应该较远');

            if (sim12 > 0.5 && sim13 < 0.5) {
                addLog('\n✓ 语义相似度测试通过! 可以准确区分意图!');
            } else {
                addLog('\n⚠ 语义相似度结果需要调整阈值');
            }

            status.textContent = '✓ 全部测试通过!';
            status.style.background = '#d4edda';

        } catch (err) {
            addLog('❌ 错误: ' + err.message, true);
            addLog('堆栈: ' + (err.stack || 'N/A'), true);
            status.textContent = '❌ 加载失败: ' + err.message;
            status.style.background = '#f8d7da';
        }
    </script>
</body>
</html>
