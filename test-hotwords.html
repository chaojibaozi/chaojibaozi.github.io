<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>验证百度/360热词API真实性</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; padding: 20px; max-width: 1000px; margin: 0 auto; }
        input { padding: 10px; font-size: 16px; width: 300px; border: 2px solid #e2e8f0; border-radius: 8px; }
        button { padding: 10px 24px; font-size: 16px; background: #667eea; color: white; border: none; border-radius: 8px; cursor: pointer; margin-left: 10px; }
        button:hover { background: #5a67d8; }
        .result-section { margin: 20px 0; padding: 20px; border-radius: 12px; }
        .baidu { background: #fef2f2; border: 1px solid #fee2e2; }
        .baidu h3 { color: #dc2626; margin: 0 0 15px 0; }
        .qihu { background: #eff6ff; border: 1px solid #dbeafe; }
        .qihu h3 { color: #2563eb; margin: 0 0 15px 0; }
        .word-item { display: inline-block; padding: 6px 12px; background: white; border-radius: 20px; margin: 5px; font-size: 14px; }
        .baidu .word-item { border: 1px solid #fee2e2; }
        .qihu .word-item { border: 1px solid #dbeafe; }
        .tip { background: #fef9c3; padding: 12px 16px; border-radius: 8px; margin-top: 20px; font-size: 14px; }
        .api-url { font-family: monospace; font-size: 12px; color: #64748b; margin-top: 10px; word-break: break-all; }
    </style>
</head>
<body>
    <h1>🔍 验证百度/360热词API真实性</h1>
    <p style="color:#64748b;">输入关键词，直接调用百度/360官方API获取真实下拉热词</p>
    
    <div style="margin:20px 0;">
        <input type="text" id="keyword" value="SEO优化" placeholder="输入关键词">
        <button onclick="fetchHotwords()">获取热词</button>
        <button onclick="clearResults()">清空</button>
    </div>

    <div id="results"></div>

    <div class="tip">
        <strong>💡 使用说明：</strong>
        <ol>
            <li>输入关键词后点击「获取热词」</li>
            <li>对比页面显示的热词与百度/360搜索实际下拉词</li>
            <li>如果结果一致，说明API是真实的</li>
        </ol>
    </div>

    <script>
        function jsonp(url) {
            return new Promise((resolve, reject) => {
                const callbackName = 'jsonp_cb_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5);
                const script = document.createElement('script');
                const fullUrl = url.replace('{callback}', callbackName);
                
                window[callbackName] = function(data) {
                    delete window[callbackName];
                    document.head.removeChild(script);
                    resolve(data);
                };
                
                script.src = fullUrl;
                script.onerror = function() {
                    delete window[callbackName];
                    document.head.removeChild(script);
                    reject(new Error('请求失败'));
                };
                
                document.head.appendChild(script);
                
                setTimeout(() => {
                    if (window[callbackName]) {
                        delete window[callbackName];
                        document.head.removeChild(script);
                        reject(new Error('请求超时'));
                    }
                }, 5000);
            });
        }

        async function fetchHotwords() {
            const keyword = document.getElementById('keyword').value.trim();
            if (!keyword) {
                alert('请输入关键词');
                return;
            }

            const results = document.getElementById('results');
            results.innerHTML = '<p style="text-align:center;color:#64748b;">正在获取热词...</p>';

            try {
                const [baiduData, qihuData] = await Promise.all([
                    jsonp('https://suggestion.baidu.com/su?wd=' + encodeURIComponent(keyword) + '&ie=utf-8&cb={callback}'),
                    jsonp('https://sug.so.com/suggest?word=' + encodeURIComponent(keyword) + '&encodein=UTF-8&encodeout=UTF-8&callback={callback}')
                ]);

                const baiduWords = baiduData.s || [];
                const qihuWords = qihuData.result || [];

                results.innerHTML = `
                    <div class="result-section baidu">
                        <h3>🌐 百度搜索下拉热词</h3>
                        <div>${baiduWords.map(w => `<span class="word-item">${escapeHtml(w)}</span>`).join('')}</div>
                        <div class="api-url">API: https://suggestion.baidu.com/su?wd=${encodeURIComponent(keyword)}</div>
                    </div>
                    <div class="result-section qihu">
                        <h3>🔷 360搜索下拉热词</h3>
                        <div>${qihuWords.map(w => `<span class="word-item">${escapeHtml(w)}</span>`).join('')}</div>
                        <div class="api-url">API: https://sug.so.com/suggest?word=${encodeURIComponent(keyword)}</div>
                    </div>
                `;
            } catch (e) {
                results.innerHTML = `<p style="color:#dc2626;">获取失败: ${e.message}</p>`;
            }
        }

        function clearResults() {
            document.getElementById('results').innerHTML = '';
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }
    </script>
</body>
</html>
