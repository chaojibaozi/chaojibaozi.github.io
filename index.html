<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>推广优化师系统</title>
    <script>if(/Mobi|Android|iPhone|iPad|iPod|webOS|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)&&window.innerWidth<768){window.location.replace('mobile/')}</script>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            overflow: hidden;
        }
        
        /* 抽屉式导航栏 - 固定浮层 */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 70px;
            height: 100vh;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            z-index: 9999;
            box-shadow: 4px 0 20px rgba(0, 0, 0, 0.15);
            border-radius: 0 12px 12px 0;
        }
        
        .sidebar:hover {
            width: 210px;
        }
        
        .sidebar-header {
            padding: 20px 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.08);
        }
        
        .sidebar-icon {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            position: relative;
            animation: rocketFloat 2s ease-in-out infinite;
        }
        .sidebar-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .sidebar-icon::after {
            content: '';
            position: absolute;
            bottom: -21px;
            left: 50%;
            transform: translateX(-50%);
            transform-origin: top center;
            width: 10px;
            height: 30px;
            background: linear-gradient(to bottom, #ff6b35 0%, #ffc107 50%, transparent 100%);
            border-radius: 0 0 50% 50% / 0 0 40% 40%;
            animation: flameJet 0.3s ease-in-out infinite alternate;
            filter: blur(1px);
        }
        @keyframes rocketFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-3px); }
        }
        @keyframes flameJet {
            0% {
                opacity: 0.7;
                transform: translateX(-50%) scaleY(0.4);
            }
            25% {
                transform: translateX(-50%) scaleY(1.3);
            }
            50% {
                transform: translateX(-50%) scaleY(0.7);
            }
            75% {
                transform: translateX(-50%) scaleY(1.1);
            }
            100% {
                opacity: 1;
                transform: translateX(-50%) scaleY(1.4);
            }
        }
        
        .sidebar-title {
            color: #1e293b;
            font-size: 18px;
            font-weight: 600;
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.3s ease 0.1s;
        }
        
        .sidebar:hover .sidebar-title {
            opacity: 1;
        }
        
        .nav-menu {
            padding: 20px 10px;
        }
        
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 12px;
            margin-bottom: 8px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #334155;
            text-decoration: none;
            user-select: none;
        }
        
        .nav-item:hover {
            background: rgba(102, 126, 234, 0.15);
            color: #667eea;
        }
        
        .nav-item.active {
            background: rgba(102, 126, 234, 0.2);
            color: #667eea;
            font-weight: 600;
        }
        
        .nav-item.dragging {
            opacity: 0.5;
            transform: scale(0.98);
        }
        
        .nav-item.drag-over {
            border-top: 3px solid #667eea;
        }
        
        .nav-item-icon {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
            cursor: grab;
        }
        
        .nav-item-icon:active {
            cursor: grabbing;
        }
        
        .nav-item-text {
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.3s ease 0.1s;
            font-size: 15px;
            font-weight: 500;
        }
        
        .sidebar:hover .nav-item-text {
            opacity: 1;
        }
        
        .drag-hint {
            padding: 8px 15px;
            color: rgba(0, 0, 0, 0.35);
            font-size: 11px;
            opacity: 0;
            transition: opacity 0.3s ease 0.1s;
        }
        
        .sidebar:hover .drag-hint {
            opacity: 1;
        }
        
        /* 主内容区域 - iframe容器 */
        .content-frame {
            width: calc(100% - 70px);
            height: 100vh;
            border: none;
            display: block;
            margin-left: 70px;
            opacity: 0;
            transition: opacity 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .content-frame.loaded {
            opacity: 1;
        }
        
        /* 页面切换过渡遮罩 */
        .transition-overlay {
            position: fixed;
            top: 0;
            left: 70px;
            width: calc(100% - 70px);
            height: 100vh;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.1) 100%);
            pointer-events: none;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .transition-overlay.active {
            opacity: 1;
        }
        
        /* 首页AI对话界面 */
        .welcome-page {
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding-left: 70px;
        }
        
        .welcome-content {
            flex: 1;
            display: flex;
            flex-direction: row;
            padding: 12px;
            min-height: 0;
            gap: 0;
        }
        
        .chat-panel {
            width: var(--chat-width, 50%);
            flex-shrink: 0;
            flex-grow: 0;
            display: flex;
            flex-direction: column;
            min-width: 0;
            min-height: 0;
        }
        
        .result-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            min-height: 0;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }
        
        /* 可拖拽分隔条 */
        .panel-divider {
            width: 8px;
            flex-shrink: 0;
            cursor: col-resize;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.15s ease;
            -webkit-user-select: none;
            user-select: none;
        }
        
        .panel-divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 3px;
            height: 32px;
            border-radius: 2px;
            background: #cbd5e1;
            box-shadow: -4px 0 0 #cbd5e1, 4px 0 0 #cbd5e1;
            transition: background 0.15s ease, box-shadow 0.15s ease;
        }
        
        .panel-divider:hover::before,
        .panel-divider.active::before {
            background: #667eea;
            box-shadow: -4px 0 0 #667eea, 4px 0 0 #667eea;
        }
        
        .panel-divider:hover,
        .panel-divider.active {
            background: rgba(102, 126, 234, 0.08);
        }
        
        .panel-divider.active {
            background: rgba(102, 126, 234, 0.15);
        }
        
        body.dragging-panel,
        body.dragging-panel * {
            cursor: col-resize !important;
            -webkit-user-select: none !important;
            user-select: none !important;
        }
        
        .result-header {
            padding: 12px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }
        
        .result-header-icon {
            width: 36px;
            height: 36px;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }
        
        .result-header h2 {
            font-size: 16px;
            font-weight: 600;
        }
        
        .result-header .result-header-sub {
            font-size: 11px;
            opacity: 0.8;
        }
        
        .result-clear-btn {
            margin-left: auto;
            padding: 5px 14px;
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 6px;
            color: white;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
            flex-shrink: 0;
        }
        
        .result-clear-btn:hover {
            background: rgba(255,255,255,0.3);
        }
        
        .result-output {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px;
            background: #fafbfc;
            min-height: 0;
        }
        
        .result-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            min-height: 300px;
            color: #94a3b8;
            text-align: center;
        }
        
        .result-placeholder .placeholder-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        
        .result-placeholder .placeholder-text {
            font-size: 14px;
            line-height: 1.6;
            max-width: 280px;
        }
        
        /* 对话窗口 */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            min-height: 0;
        }
        
        .chat-header {
            padding: 12px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }
        
        .chat-header-icon {
            width: 36px;
            height: 36px;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }
        
        .chat-header h1 {
            font-size: 16px;
            font-weight: 600;
        }
        
        .chat-header .header-sub {
            font-size: 11px;
            opacity: 0.8;
        }
        
        .chat-header .status {
            margin-left: auto;
            font-size: 11px;
            opacity: 0.8;
            display: flex;
            align-items: center;
            gap: 5px;
            flex-shrink: 0;
        }
        
        .chat-header .status-text {
            cursor: default;
            transition: color 0.2s ease;
        }
        .chat-header .status-text.clickable {
            cursor: pointer;
            text-decoration: underline;
            text-decoration-style: dotted;
            text-underline-offset: 2px;
        }
        .chat-header .status-text.clickable:hover {
            color: #667eea;
            opacity: 1;
        }
        
        .chat-header .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            display: inline-block;
        }
        
        .status-dot.online { background: #22c55e; }
        .status-dot.loading { background: #f59e0b; animation: pulse 1.5s infinite; }
        .status-dot.offline { background: #ef4444; }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        
        .chat-messages {
            flex: 1 1 0;
            overflow-y: auto;
            padding: 16px 20px;
            background: #fafbfc;
            min-height: 0;
        }
        
        .chat-message {
            margin-bottom: 14px;
            animation: messageIn 0.35s ease;
            display: flex;
            flex-direction: column;
        }
        
        .chat-message:last-child {
            margin-bottom: 0;
        }
        
        @keyframes messageIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message-row {
            display: flex;
            gap: 10px;
            max-width: 85%;
        }
        
        .user-message .message-row {
            margin-left: auto;
            flex-direction: row-reverse;
        }
        
        .message-avatar {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
            align-self: flex-end;
        }
        
        .user-message .message-avatar {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        
        .assistant-message .message-avatar {
            background: #e2e8f0;
            color: #64748b;
        }
        
        .message-bubble {
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.6;
            font-size: 14px;
            word-break: break-word;
            overflow-wrap: break-word;
            max-width: 100%;
        }
        
        .message-bubble img {
            max-width: 100%;
            height: auto;
        }
        
        .user-message .message-bubble {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-bottom-right-radius: 4px;
        }
        
        .assistant-message .message-bubble {
            background: white;
            color: #334155;
            border: 1px solid #e2e8f0;
            border-bottom-left-radius: 4px;
        }
        
        .message-bubble code {
            background: rgba(102, 126, 234, 0.1);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 13px;
        }
        
        .assistant-message .message-bubble code {
            background: #f1f5f9;
        }
        
        /* 对话中的文件上传区 */
        .chat-upload-area {
            border: 2px dashed #cbd5e1;
            border-radius: 8px;
            padding: 14px 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #f8fafc;
            margin: 4px 0;
        }
        
        .chat-upload-area:hover {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.05);
        }
        
        .chat-upload-area.drag-over {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.1);
        }
        
        .chat-upload-icon {
            font-size: 28px;
            margin-bottom: 4px;
        }
        
        .chat-upload-text {
            color: #64748b;
            font-size: 13px;
        }
        
        .chat-upload-hint {
            color: #94a3b8;
            font-size: 11px;
            margin-top: 4px;
        }
        
        /* 图片预览在对话中 */
        .message-image {
            max-width: 280px;
            max-height: 280px;
            border-radius: 8px;
            margin-top: 8px;
            display: block;
        }
        
        .result-image-container {
            margin-top: 8px;
        }
        
        .result-image-container img {
            max-width: 280px;
            max-height: 280px;
            border-radius: 10px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
        }
        
        /* 下载按钮 */
        .download-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 18px;
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            font-family: inherit;
        }
        
        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }
        
        /* 结果表格 */
        .result-table-wrap {
            max-height: 300px;
            overflow-y: auto;
            margin-top: 10px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
        }
        
        .result-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        
        .result-table th {
            background: #f8fafc;
            padding: 10px 12px;
            text-align: left;
            font-weight: 600;
            color: #475569;
            border-bottom: 2px solid #e2e8f0;
            position: sticky;
            top: 0;
            z-index: 1;
        }
        
        .result-table td {
            padding: 8px 12px;
            border-bottom: 1px solid #f1f5f9;
            color: #334155;
        }
        
        .result-table tbody tr:hover {
            background: #f0f2ff;
        }

        .result-chart-wrap {
            margin: 12px 0;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            overflow: hidden;
        }

        .result-chart-header {
            padding: 12px 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .result-chart-header .chart-info {
            font-size: 12px;
            opacity: 0.85;
            font-weight: 400;
        }

        .result-chart-body {
            padding: 12px;
        }

        .result-chart-body canvas {
            display: block;
        }

        .result-stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 12px;
        }

        @media (max-width: 600px) {
            .result-stats-row { grid-template-columns: repeat(2, 1fr); }
        }

        .result-stat-item {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 10px 12px;
            text-align: center;
        }

        .result-stat-item .label { font-size: 11px; color: #94a3b8; margin-bottom: 4px; }
        .result-stat-item .value { font-size: 18px; font-weight: 700; color: #1e293b; }
        .result-stat-item .value.primary { color: #667eea; }
        .result-stat-item .value.success { color: #10b981; }
        .result-stat-item .value.warning { color: #f59e0b; }
        .result-stat-item .value.danger { color: #ef4444; }

        .chart-legend {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            padding: 8px 12px;
            background: #fafbfc;
            border-top: 1px solid #e2e8f0;
        }

        .chart-legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 11px;
            color: #64748b;
            padding: 3px 8px;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.15s;
        }

        .chart-legend-item:hover { border-color: #667eea; color: #667eea; }
        .chart-legend-item.hidden { opacity: 0.4; text-decoration: line-through; }

        .chart-legend-dot {
            width: 10px;
            height: 3px;
            border-radius: 2px;
            flex-shrink: 0;
        }

        .rank {
            display: inline-block; width: 24px; height: 24px; line-height: 24px;
            text-align: center; border-radius: 50%; font-weight: 700; font-size: 12px;
        }
        .rank.top3 { background: linear-gradient(135deg, #ffd700, #ffaa00); color: white; }
        .rank.normal { background: #e9ecef; color: #666; }

        .tag { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 12px; font-weight: 500; }
        .tag-blue { background: rgba(102,126,234,0.1); color: #667eea; }
        .tag-yellow { background: rgba(245,158,11,0.1); color: #d97706; }
        .tag-green { background: rgba(16,185,129,0.1); color: #059669; }
        .tag-purple { background: rgba(139,92,246,0.1); color: #7c3aed; }
        
        .summary-box {
            background: #f0f9ff;
            border: 1px solid #bae6fd;
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 12px;
        }
        
        .summary-box h4 {
            font-size: 14px;
            color: #0369a1;
            margin-bottom: 6px;
        }
        
        .summary-box p {
            font-size: 13px;
            color: #475569;
            line-height: 1.6;
        }
        
        /* 聊天输入区域 */
        .chat-input-wrapper {
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-height: 0;
        }
        
        .chat-input-area {
            flex: 1;
            padding: 10px 20px 12px;
            border-top: 1px solid #e2e8f0;
            background: white;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            min-height: 150px;
        }
        
        .input-toolbar {
            display: flex;
            gap: 6px;
            margin-bottom: 8px;
            flex-wrap: wrap;
            flex-shrink: 0;
        }
        
        .toolbar-btn {
            padding: 6px 12px;
            border: 1px solid #e2e8f0;
            background: #f8fafc;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            color: #475569;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 4px;
            font-family: inherit;
        }
        
        .toolbar-btn:hover {
            background: #e2e8f0;
            border-color: #94a3b8;
        }
        
        .input-wrapper {
            display: flex;
            gap: 8px;
            align-items: stretch;
            flex: 1;
            min-height: 0;
        }

        // ============================================================

                    savedOrder.forEach(id => {
                        const item = navItems.find(n => n.id === id);
                        if (item) newOrder.push(item);
                    });
                    navItems.forEach(item => {
                        if (!newOrder.find(n => n.id === item.id)) newOrder.push(item);

                    return newOrder;

            }
            return navItems;

        // 拖拽

                item.addEventListener('dragstart', e => { draggedItem = item; item.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'; });
                item.addEventListener('dragend', () => { item.classList.remove('dragging'); document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('drag-over')); });
                item.addEventListener('dragover', e => { e.preventDefault(); if (item !== draggedItem) item.classList.add('drag-over'); });

                item.addEventListener('drop', e => {
                    e.preventDefault(); item.classList.remove('drag-over');
                    if (item !== draggedItem) {
                        const menu = document.getElementById('navMenu');

        }
        
        // ============================================================
        // 3. AI 意图检测引擎
        // ============================================================

        const INTENT_LABELS = {
            'removeBg': ['抠图', '去除背景', '图片编辑', '证件照处理'],
            'generateGif': ['生成动图', '制作GIF', '图片合成动画'],

        async function detectIntent(text) {

        async function initAI() {

        function updateAIStatus(status, text) {

        }
        
        // 中文关键词检测（增强版，覆盖更全面的情况）
        const KEYWORD_MAP = [
            { 
                action: 'removeBg', 
                keywords: ['抠图', '抠背景', '去除背景', '移除背景', '删除背景', '透明背景', '去背景', '证件照', 'p图', 'ps', 
                         '背景去除', '背景透明', '背景移除', '去掉背景', '去除底色', '去掉底色', '背景替换', '换背景', '换底色',
                         '白底图', '透明图', '抠人像', '抠产品', '抠物体'] 
            },
            { 
                action: 'generateGif', 
                keywords: ['gif', '动图', '动画', 'gif生成', '制作gif', '生成gif', '做动图', '生成动图', '图片合成',
                         '做gif', '合成gif', '动图制作', '动画制作', '多张图片合成', '图片转gif', '照片变gif'] 
            },
            { 
                action: 'analyzeKeywords', 
                keywords: ['关键词', '关键词分析', 'sem', '推广词', '竞价词', '关键词报告', '关键词统计',
                         '分析关键词', '关键词优化', '关键词数据', '推广分析', '竞价分析', 'sem分析',
                         'sem数据', '关键词报表', '关键词效果'] 
            },
            { 
                action: 'analyzeSearchTerms', 
                keywords: ['搜索词', '搜索词分析', '语义匹配', '匹配度', '否词', '搜索查询', 'query',
                         '分析搜索词', '搜索词数据', '搜索查询分析', '否词分析', '匹配分析', '搜索词报表'] 
            },
            { 
                action: 'tuociSystem', 
                keywords: ['拓词', '拓词系统', '关键词扩展', '扩展关键词', '智能拓词', '词根拓词', '关键词拓词',
                         '拓词功能', '拓词工具', '关键词拓词', '扩展词', '词库扩展', '拓词服务', '词根扩展']

        ];

        function fallbackDetectIntent(text) {
            const lower = text.toLowerCase();
            for (const entry of KEYWORD_MAP) {
                for (const kw of entry.keywords) {
                    if (lower.includes(kw.toLowerCase())) {
                        return { action: entry.action, confidence: 0.8, method: 'keyword' };

            return null;
        }
        
        // ============================================================
        // 4. GIF生成（纯JS内联，无需Web Worker）

        let gifWorkerBlobUrl = null;

        async function initGifWorker() {
            if (gifWorkerBlobUrl) return gifWorkerBlobUrl;
            try {
                const resp = await fetch('https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.worker.js');

            } catch (e) {
                return null;

        }

        // ============================================================
        // 5. 内联抠图处理（纯JS算法，无需iframe）
        // ============================================================
        function processRemoveBgInline(imageDataUrl) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.onload = () => {
                    try {
                        const canvas = document.createElement('canvas');
                        canvas.width = img.width;
                        canvas.height = img.height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0);
                        const imageData = ctx.getImageData(0, 0, img.width, img.height);
                        const pixels = imageData.data;

                        const MAX_PROC = 400;
                        const scale = Math.min(1, MAX_PROC / Math.max(img.width, img.height));
                        const pw = Math.round(img.width * scale) || 1;
                        const ph = Math.round(img.height * scale) || 1;

                        const pc = document.createElement('canvas');
                        pc.width = pw;
                        pc.height = ph;
                        const pctx = pc.getContext('2d');
                        pctx.drawImage(img, 0, 0, pw, ph);
                        const pd = pctx.getImageData(0, 0, pw, ph);
                        const pp = pd.data;

                        const edgeMap = new Uint8Array(pw * ph);
                        for (let y = 1; y < ph - 1; y++) {
                            for (let x = 1; x < pw - 1; x++) {
                                const gi = (y * pw + x) * 4;
                                const gx = -(pp[((y-1)*pw+(x-1))*4]*0.299+pp[((y-1)*pw+(x-1))*4+1]*0.587+pp[((y-1)*pw+(x-1))*4+2]*0.114) -2*(pp[(y*pw+(x-1))*4]*0.299+pp[(y*pw+(x-1))*4+1]*0.587+pp[(y*pw+(x-1))*4+2]*0.114) -(pp[((y+1)*pw+(x-1))*4]*0.299+pp[((y+1)*pw+(x-1))*4+1]*0.587+pp[((y+1)*pw+(x-1))*4+2]*0.114) +(pp[((y-1)*pw+(x+1))*4]*0.299+pp[((y-1)*pw+(x+1))*4+1]*0.587+pp[((y-1)*pw+(x+1))*4+2]*0.114) +2*(pp[(y*pw+(x+1))*4]*0.299+pp[(y*pw+(x+1))*4+1]*0.587+pp[(y*pw+(x+1))*4+2]*0.114) +(pp[((y+1)*pw+(x+1))*4]*0.299+pp[((y+1)*pw+(x+1))*4+1]*0.587+pp[((y+1)*pw+(x+1))*4+2]*0.114);
                                const gy = -(pp[((y-1)*pw+(x-1))*4]*0.299+pp[((y-1)*pw+(x-1))*4+1]*0.587+pp[((y-1)*pw+(x-1))*4+2]*0.114) -2*(pp[((y-1)*pw+x)*4]*0.299+pp[((y-1)*pw+x)*4+1]*0.587+pp[((y-1)*pw+x)*4+2]*0.114) -(pp[((y-1)*pw+(x+1))*4]*0.299+pp[((y-1)*pw+(x+1))*4+1]*0.587+pp[((y-1)*pw+(x+1))*4+2]*0.114) +(pp[((y+1)*pw+(x-1))*4]*0.299+pp[((y+1)*pw+(x-1))*4+1]*0.587+pp[((y+1)*pw+(x-1))*4+2]*0.114) +2*(pp[((y+1)*pw+x)*4]*0.299+pp[((y+1)*pw+x)*4+1]*0.587+pp[((y+1)*pw+x)*4+2]*0.114) +(pp[((y+1)*pw+(x+1))*4]*0.299+pp[((y+1)*pw+(x+1))*4+1]*0.587+pp[((y+1)*pw+(x+1))*4+2]*0.114);
                                edgeMap[y * pw + x] = Math.min(255, Math.round(Math.sqrt(gx * gx + gy * gy)));
                            }
                        }

                        let sumR = 0, sumG = 0, sumB = 0;
                        for (let i = 0; i < pw * ph; i++) {
                            sumR += pp[i * 4]; sumG += pp[i * 4 + 1]; sumB += pp[i * 4 + 2];
                        }
                        const avgR = sumR / (pw * ph), avgG = sumG / (pw * ph), avgB = sumB / (pw * ph);

                        const saliency = new Float32Array(pw * ph);
                        const cx = pw / 2, cy = ph / 2, maxD = Math.sqrt(cx * cx + cy * cy);
                        for (let y = 0; y < ph; y++) {
                            for (let x = 0; x < pw; x++) {
                                const idx = y * pw + x, pi = idx * 4;
                                const dr = pp[pi] - avgR, dg = pp[pi + 1] - avgG, db = pp[pi + 2] - avgB;
                                const cc = Math.sqrt(dr * dr + dg * dg + db * db) / 255;
                                const es = edgeMap[idx] / 255;
                                const cb = 1 - (Math.sqrt((x - cx) ** 2 + (y - cy) ** 2) / maxD) * 0.4;
                                saliency[idx] = cc * 0.3 + es * 0.4 + cb * 0.3;
                            }
                        }
                        let maxS = 0;
                        for (let i = 0; i < pw * ph; i++) { if (saliency[i] > maxS) maxS = saliency[i]; }
                        if (maxS > 0) for (let i = 0; i < pw * ph; i++) saliency[i] /= maxS;

                        const step = Math.max(1, Math.floor(Math.min(pw, ph) / 8));
                        let bx = Math.floor(pw / 2), by = Math.floor(ph / 2), bs = -1;
                        for (let y = step; y < ph - step; y += step) {
                            for (let x = step; x < pw - step; x += step) {
                                if (saliency[y * pw + x] > bs) { bs = saliency[y * pw + x]; bx = x; by = y; }
                            }
                        }

                        const mask = new Uint8Array(pw * ph);
                        const visited = new Uint8Array(pw * ph);
                        const queue = [{ x: bx, y: by }];
                        let qi = 0;
                        const th = Math.max(0.1, Math.min(0.35, bs * 0.5));
                        while (qi < queue.length) {
                            const { x, y } = queue[qi++];
                            const idx = y * pw + x;
                            if (visited[idx]) continue;
                            visited[idx] = 1;
                            if (saliency[idx] < th) continue;
                            mask[idx] = 1;
                            for (let dy = -1; dy <= 1; dy++) for (let dx = -1; dx <= 1; dx++) {
                                if (dx === 0 && dy === 0) continue;
                                const nx = x + dx, ny = y + dy;
                                if (nx >= 0 && nx < pw && ny >= 0 && ny < ph) queue.push({ x: nx, y: ny });
                            }
                        }

                        for (let iter = 0; iter < 2; iter++) {
                            const t = new Uint8Array(pw * ph);
                            for (let y = 0; y < ph; y++) for (let x = 0; x < pw; x++) {
                                const idx = y * pw + x; let c = 0, tot = 0;
                                for (let dy = -2; dy <= 2; dy++) for (let dx = -2; dx <= 2; dx++) {
                                    const nx = x + dx, ny = y + dy;
                                    if (nx >= 0 && nx < pw && ny >= 0 && ny < ph) { if (mask[ny * pw + nx]) c++; tot++; }
                                }
                                t[idx] = c >= tot * 0.5 ? 1 : 0;
                            }
                            for (let i = 0; i < pw * ph; i++) mask[i] = t[i];
                        }

                        for (let y = 0; y < img.height; y++) {
                            for (let x = 0; x < img.width; x++) {
                                const mx = Math.min(pw - 1, Math.max(0, Math.round(x * scale)));
                                const my = Math.min(ph - 1, Math.max(0, Math.round(y * scale)));
                                const pi = (y * img.width + x) * 4;
                                pixels[pi + 3] = mask[my * pw + mx] ? 255 : 0;
                            }
                        }

                        ctx.putImageData(imageData, 0, 0);
                        resolve(canvas.toDataURL('image/png'));
                    } catch (e) { reject(e.message); }
                };
                img.onerror = () => reject('图片加载失败');
                img.src = imageDataUrl;
            });
        }

        // 6. 内联关键词/搜索词分析
        // ============================================================
        function parseDateRange(dateStr) {
            const dates = [];
            if (!dateStr || typeof dateStr !== 'string') return dates;
            dateStr = dateStr.trim();
            const match = dateStr.match(/^(\d{4})-(\d{1,2})-(\d{1,2})([\u4e00-\u9fa5至\-~到]+)(\d{4})-(\d{1,2})-(\d{1,2})$/);
            if (match) {
                let start = new Date(parseInt(match[1]), parseInt(match[2]) - 1, parseInt(match[3]));
                let end = new Date(parseInt(match[5]), parseInt(match[6]) - 1, parseInt(match[7]));
                if (isNaN(start.getTime()) || isNaN(end.getTime()) || start > end) {
                    dates.push(dateStr); return dates;
                }
                let current = new Date(start);
                while (current <= end) {
                    dates.push(current.getFullYear() + '-' + String(current.getMonth() + 1).padStart(2, '0') + '-' + String(current.getDate()).padStart(2, '0'));
                    current.setDate(current.getDate() + 1);
                }
            } else {
                dates.push(dateStr);
            }
            return dates;
        }

        function getValue(row, keys) {
            for (let key of keys) {
                if (row[key] !== undefined && row[key] !== null) return row[key];
            }
            return null;
        }

        function analyzeKeywordsInline(rows) {
            const keywordMap = new Map();
            const headers = Object.keys(rows[0] || {});
            const keyKw = headers.find(h => /关键词|搜索词|key|keyword|search_term|searchWord/i.test(h));
            const keyTime = headers.find(h => /时间|日期|Date|date|统计日期/i.test(h));
            const keyCost = headers.find(h => /总费用|消费|费用|Cost|spend|总消费|花费|金额/i.test(h));
            const keyConv = headers.find(h => /转化数|转化|转化量|转化次数|Conversions|转化目标数/i.test(h));
            const keyClicks = headers.find(h => /点击次数|点击|Clicks|clicks|点击量/i.test(h));

            for (const row of rows) {
                const kw = (getValue(row, [keyKw, '关键词', '搜索词', 'KeyWord', 'SearchTerm', 'Keyword']) || '').toString().trim();
                if (!kw) continue;
                if (!keywordMap.has(kw)) {
                    keywordMap.set(kw, {
                        keyword: kw,
                        totalCost: 0, totalConversion: 0, totalClicks: 0,
                        dailyData: new Map()
                    });
                }
                const kd = keywordMap.get(kw);
                const cost = parseFloat(getValue(row, [keyCost, '总费用', '消费', 'Cost', 'cost', '总消费', '花费', '金额'])) || 0;
                const conv = parseInt(getValue(row, [keyConv, '转化数', '转化', '转化量', 'Conversions', 'conversions'])) || 0;
                const clicks = parseInt(getValue(row, [keyClicks, '点击次数', '点击', 'Clicks', 'clicks'])) || 0;
                kd.totalCost += cost;
                kd.totalConversion += conv;
                kd.totalClicks += clicks;

                const timeVal = getValue(row, [keyTime, '时间', '日期', 'Date', 'date', '统计日期']) || '';
                const dates = parseDateRange(timeVal.toString());
                if (dates.length === 1) {
                    const d = dates[0];
                    if (kd.dailyData.has(d)) {
                        const e = kd.dailyData.get(d);
                        e.cost += cost; e.conversion += conv; e.clicks += clicks;
                    } else {
                        kd.dailyData.set(d, { date: d, cost, conversion: conv, clicks });
                    }
                } else if (dates.length > 1) {
                    const dc = cost / dates.length, cv = conv / dates.length, cl = clicks / dates.length;
                    dates.forEach(d => {
                        if (kd.dailyData.has(d)) {
                            const e = kd.dailyData.get(d);
                            e.cost += dc; e.conversion += cv; e.clicks += cl;
                        } else {
                            kd.dailyData.set(d, { date: d, cost: dc, conversion: cv, clicks: cl });
                        }
                    });
                }
            }

            keywordMap.forEach(k => {
                k.dailyData.forEach(day => {
                    day.cpc = day.clicks > 0 ? day.cost / day.clicks : 0;
                });
            });

            const arr = Array.from(keywordMap.values()).sort((a, b) => b.totalConversion - a.totalConversion);
            const top20 = arr.slice(0, 20);

            const dateSet = new Set();
            top20.forEach(k => k.dailyData.forEach((v, d) => dateSet.add(d)));
            const dates = Array.from(dateSet).sort();

            return {
                summary: {
                    totalKeywords: arr.length,
                    totalCost: arr.reduce((s, k) => s + k.totalCost, 0),
                    totalConversion: arr.reduce((s, k) => s + k.totalConversion, 0),
                    totalClicks: arr.reduce((s, k) => s + k.totalClicks, 0),
                    avgCPC: arr.reduce((s, k) => s + k.totalClicks, 0) > 0 ? arr.reduce((s, k) => s + k.totalCost, 0) / arr.reduce((s, k) => s + k.totalClicks, 0) : 0
                },
                keywordStats: arr.map(v => ({ keyword: v.keyword, count: Math.round(v.totalConversion), impressions: 0, clicks: Math.round(v.totalClicks), cost: v.totalCost, ctr: 0, avgCpc: v.totalClicks > 0 ? v.totalCost / v.totalClicks : 0 })),
                topKeywords: top20.map(v => ({ keyword: v.keyword, count: Math.round(v.totalConversion) })),
                chartData: {
                    dates,
                    topKeywords: top20.map((k, idx) => ({
                        keyword: k.keyword,
                        totalConversion: k.totalConversion,
                        conversionCost: k.totalConversion > 0 ? k.totalCost / k.totalConversion : 0,
                        series: dates.map(d => {
                            const day = k.dailyData.get(d);
                            return { date: d, conversion: day ? day.conversion : 0, cost: day ? day.cost : 0, cpc: day ? day.cpc : 0, clicks: day ? day.clicks : 0 };
                        })
                    }))
                }
            };
        }

        function analyzeSearchTermsInline(rows) {
            const stats = {};
            const headers = Object.keys(rows[0] || {});
            const termField = headers.find(h => /搜索词|搜索|search|query|term/i.test(h));
            const kwField = headers.find(h => /关键词|key|keyword/i.test(h));

            for (const row of rows) {
                const term = (row[termField] || '').trim();
                if (!term) continue;
                if (!stats[term]) stats[term] = { term, count: 0, relatedKeywords: [], scores: [] };
                stats[term].count++;
                const kw = (row[kwField] || '').trim();
                if (kw && !stats[term].relatedKeywords.includes(kw)) stats[term].relatedKeywords.push(kw);
                stats[term].scores.push(kw ? 5 : 0);
            }

            const arr = Object.values(stats);
            arr.sort((a, b) => b.count - a.count);

            return {
                totalTerms: arr.length,
                searchStats: arr.map(v => ({
                    term: v.term,
                    count: v.count,
                    relatedKeywords: v.relatedKeywords,
                    avgScore: v.scores.length > 0 ? v.scores.reduce((s, c) => s + c, 0) / v.scores.length : 0
                })),
                topTerms: arr.slice(0, 20).map(v => ({ term: v.term, count: v.count }))
            };
        }

        function addUserText(text) {
            return addMessage('user', `

                    <div class="message-bubble">${escapeHtml(text)}</div>
                </div>
            `);
        }
        
        let streamingTimer = null;

        function addAssistantText(html) {
            if (streamingTimer) {
                clearTimeout(streamingTimer);
                streamingTimer = null;
            }

            const messagesEl = document.getElementById('chatMessages');
            const div = document.createElement('div');
            div.className = 'chat-message assistant-message';
            const row = document.createElement('div');
            row.className = 'message-row';
            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.textContent = '🤖';
            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            row.appendChild(avatar);
            row.appendChild(bubble);
            div.appendChild(row);
            messagesEl.appendChild(div);

            const tokens = [];
            let remaining = html;
            while (remaining.length > 0) {
                const tagStart = remaining.indexOf('<');
                if (tagStart === 0) {
                    const tagEnd = remaining.indexOf('>');
                    if (tagEnd !== -1) {
                        tokens.push({ t: 'tag', v: remaining.substring(0, tagEnd + 1) });
                        remaining = remaining.substring(tagEnd + 1);
                        continue;
                    }
                }
                if (tagStart > 0) {
                    tokens.push({ t: 'text', v: remaining.substring(0, tagStart) });
                    remaining = remaining.substring(tagStart);
                } else if (tagStart === -1) {
                    tokens.push({ t: 'text', v: remaining });
                    remaining = '';
                } else {
                    tokens.push({ t: 'text', v: '<' });
                    remaining = remaining.substring(1);
                }
            }

            let ti = 0, ci = 0;
            let out = '';

            function streamNext() {
                if (ti >= tokens.length) return;
                const tok = tokens[ti];
                if (tok.t === 'tag') {
                    out += tok.v;
                    bubble.innerHTML = out;
                    ti++;
                    messagesEl.scrollTop = messagesEl.scrollHeight;
                    streamNext();
                    return;
                }
                if (ci < tok.v.length) {
                    out += tok.v[ci];
                    bubble.innerHTML = out;
                    ci++;
                    messagesEl.scrollTop = messagesEl.scrollHeight;
                    streamingTimer = setTimeout(streamNext, 31);
                } else {
                    ci = 0;
                    ti++;
                    streamNext();
                }
            }

            messagesEl.scrollTop = messagesEl.scrollHeight;
            streamNext();
        }

                const workerUrl = await initGifWorker();
                const gif = new GIF({
                    workers: workerUrl ? 2 : 0,
                    quality: 10,
                    width: 363,
                    height: 225,
                    repeat: 0,
                    workerScript: workerUrl || undefined
                });
                
                const delay = Math.round(1000 / 12);
                const canvas = document.createElement('canvas');

                canvas.height = 225;

                loadedImages.forEach((img) => {

                    const sx = (363 - Math.min(img.width, 363)) / 2;
                    const sy = (225 - Math.min(img.height, 225)) / 2;
                    const dw = Math.min(img.width, 363);
                    const dh = Math.min(img.height, 225);
                    ctx.drawImage(img, sx, sy, dw, dh);
                    gif.addFrame(ctx, { copy: true, delay });
                });
                
                const result = await new Promise((resolve, reject) => {
                    const timeout = setTimeout(() => reject('GIF编码超时'), 30000);

                        clearTimeout(timeout);
                        const r = new FileReader();
                        r.onloadend = () => resolve(r.result);

                    gif.on('error', (err) => { clearTimeout(timeout); reject(err); });

                hideTyping();

                addAssistantText('❌ GIF生成失败：' + err + '<br>请确认图片格式正确后再试。');

        function parseCSV(text) {
            const lines = text.split(/\r?\n/).filter(l => l.trim());
            if (lines.length < 2) return null;
            const headers = parseCSVLine(lines[0]).map(h => h.trim().replace(/^"|"$/g, ''));
            const rows = [];
            for (let i = 1; i < lines.length; i++) {
                const vals = parseCSVLine(lines[i]).map(v => v.trim().replace(/^"|"$/g, ''));
                if (vals.length === headers.length) {
                    const row = {};
                    headers.forEach((h, idx) => row[h] = vals[idx]);
                    rows.push(row);
                }
            }
            return rows;
        }
        
        function parseCSVLine(line) {
            const result = [];
            let current = '';
            let inQuotes = false;
            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                if (char === '"') {
                    if (inQuotes && i + 1 < line.length && line[i + 1] === '"') {
                        current += '"';
                        i++;
                    } else {
                        inQuotes = !inQuotes;
                    }
                } else if (char === ',' && !inQuotes) {
                    result.push(current);
                    current = '';
                } else {

        const InlineTuociEngine = {
            suffixes: ['价格', '多少钱', '怎么样', '好不好', '哪家好', '推荐', '教程', '方法', '技巧',
                      '大全', '排行榜', '公司', '品牌', '官网', '电话', '地址', '哪里有', '怎么选',
                      '平台', 'APP', '软件', '系统', '解决方案', '报价', '批发', '供应商', '厂家'],
            prefixes: ['专业', '优质', '便宜', '好用', '最新', '热门', '精选', '实惠', '高级',
                      '经典', '靠谱', '正规', '口碑好', '性价比高'],
            modifiers: ['和', '与', '对比', '比较', 'vs', 'PK', '还是'],

            classifyIntent(keyword) {
                const text = keyword.toLowerCase();
                if (text.includes('价格') || text.includes('多少钱') || text.includes('报价') || text.includes('批发') || text.includes('买')) return '交易型';
                if (text.includes('怎么样') || text.includes('好不好') || text.includes('对比') || text.includes('比较') || text.includes('哪个好') || text.includes('怎么选')) return '评估型';
                if (text.includes('什么') || text.includes('怎么') || text.includes('如何') || text.includes('教程') || text.includes('方法') || text.includes('技巧')) return '了解型';
                if (text.includes('哪家') || text.includes('公司') || text.includes('品牌') || text.includes('供应商') || text.includes('厂家')) return '探索型';
                const r = Math.random();
                if (r < 0.35) return '了解型';
                if (r < 0.65) return '评估型';
                if (r < 0.85) return '交易型';
                return '探索型';
            },

            expandKeywords(text) {
                const results = [];
                const seen = new Set();
                const seeds = text.split('\n').map(w => w.trim()).filter(w => w.length > 0);
                if (seeds.length === 0) return results;
                const maxKeywords = 200;
                const addKeyword = (kw, src, hot) => {
                    const key = kw.replace(/\s+/g, '');
                    if (seen.has(key) || results.length >= maxKeywords) return;
                    seen.add(key);
                    results.push({
                        text: kw, source: src || '词根', isHotWord: !!hot,
                        searchVolume: Math.floor(Math.random() * 10000) + 50,
                        competition: parseFloat((Math.random() * 0.9 + 0.1).toFixed(2)),
                        businessValue: this.calculateBusinessValue(kw),
                        intent: this.classifyIntent(kw),
                    });
                };
                seeds.forEach(seed => {
                    addKeyword(seed, '词根', false);
                    this.suffixes.forEach(s => addKeyword(seed + s, '语义扩展', false));
                    this.prefixes.forEach(p => addKeyword(p + seed, '语义扩展', false));
                    this.modifiers.forEach(mod => {
                        seeds.forEach(other => {
                            if (other !== seed) addKeyword(seed + mod + other, '组合扩展', false);
                        });
                    });
                });
                return results;
            },

            calculateBusinessValue(keyword) {
                let value = 50;
                const t = keyword.toLowerCase();
                if (t.includes('价格') || t.includes('多少钱') || t.includes('买')) value += 30;
                if (t.includes('公司') || t.includes('品牌') || t.includes('供应商')) value += 25;
                if (t.includes('怎么样') || t.includes('推荐')) value += 20;
                if (t.includes('专业') || t.includes('官方')) value += 15;
                if (t.length > 4 && t.length < 10) value += 10;
                return Math.min(value, 100);
            }
        };

            output.innerHTML = html;
        }
        
        function clearResultPanel() {
            const output = document.getElementById('resultOutput');
            output.innerHTML = `
                <div class="result-placeholder">
                    <div class="placeholder-icon">📂</div>
                    <div class="placeholder-text">在左侧进行对话操作后，<br>处理结果将显示在这里</div>
                </div>
            `;
        }
        
        // ============================================================
        // 10. 面板分隔条拖拽
        // ============================================================
        const DIVIDER_STORAGE_KEY = 'panelDividerRatio';
        let dividerDragging = false;
        
        function initPanelDivider() {
            const divider = document.getElementById('panelDivider');
            const container = document.querySelector('.welcome-content');
            const chatPanel = document.querySelector('.chat-panel');
            if (!divider || !container || !chatPanel) return;
            
            const saved = localStorage.getItem(DIVIDER_STORAGE_KEY);
            if (saved) {
                const ratio = parseFloat(saved);
                if (ratio >= 0.4 && ratio <= 0.5) {
                    container.style.setProperty('--chat-width', (ratio * 100) + '%');
                }
            }
            
            divider.addEventListener('mousedown', function(e) {
                e.preventDefault();
                dividerDragging = true;
                divider.classList.add('active');
                document.body.classList.add('dragging-panel');
            });
            
            document.addEventListener('mousemove', function(e) {
                if (!dividerDragging) return;
                
                const rect = container.getBoundingClientRect();
                const containerWidth = rect.width;
                const mouseX = e.clientX - rect.left;
                
                const dividerWidth = divider.offsetWidth;
                const padding = parseFloat(getComputedStyle(container).paddingLeft) + parseFloat(getComputedStyle(container).paddingRight);
                const usableWidth = containerWidth - padding - dividerWidth;
                
                let ratio = mouseX / usableWidth;
                ratio = Math.max(0.4, Math.min(0.5, ratio));
                
                container.style.setProperty('--chat-width', (ratio * 100) + '%');
            });
            
            document.addEventListener('mouseup', function() {
                if (!dividerDragging) return;
                dividerDragging = false;
                divider.classList.remove('active');
                document.body.classList.remove('dragging-panel');
                
                const ratioStr = container.style.getPropertyValue('--chat-width');
                if (ratioStr) {
                    const ratio = parseFloat(ratioStr) / 100;
                    if (ratio >= 0.4 && ratio <= 0.5) {
                        localStorage.setItem(DIVIDER_STORAGE_KEY, ratio.toString());
                    }
                }
            });
        }
        
        // ============================================================
        // 8. 辅助函数
        // ============================================================
        function downloadResult(dataUrl, fileName) {
            const a = document.createElement('a');
            a.href = dataUrl;
            a.download = fileName;
            a.click();
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function adjustInputHeight() {
            const el = document.getElementById('chatInput');
            el.style.height = 'auto';
            const scrollH = el.scrollHeight;
            el.style.height = Math.max(scrollH, 42) + 'px';
        }
        
        // ============================================================
        // 9. 事件绑定
        // ============================================================
        document.getElementById('sendBtn').addEventListener('click', sendMessage);
        
        document.getElementById('chatInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        
        document.getElementById('chatInput').addEventListener('input', adjustInputHeight);
        
        // 文件上传
        document.getElementById('fileInput').addEventListener('change', function(e) {
            if (e.target.files.length > 0) {
                handleFileUpload(e.target.files);
            }
            e.target.value = '';
        });
        
        document.getElementById('fileInputData').addEventListener('change', function(e) {
            if (e.target.files.length > 0) {
                handleFileUpload(e.target.files);
            }
            e.target.value = '';
        });
        
        // 工具栏按钮
        document.getElementById('uploadBtnBg').addEventListener('click', () => {
            pendingIntent = 'removeBg';
            addAssistantText('好的，请上传需要抠图的图片 👇');
            addUploadPrompt('removeBg', 'image/*', false, '点击此处上传需要去除背景的图片');
        });
        
        document.getElementById('uploadBtnGif').addEventListener('click', () => {
            pendingIntent = 'generateGif';
            addAssistantText('好的，请上传多张图片合成GIF动图 👇');
            addUploadPrompt('generateGif', 'image/*', true, '点击此处上传多张图片（至少2张）');
        });
        
        document.getElementById('uploadBtnKeyword').addEventListener('click', () => {
            pendingIntent = 'analyzeKeywords';
            addAssistantText('好的，请上传SEM关键词数据报表 👇');
            addUploadPrompt('analyzeKeywords', '.csv,.xlsx,.xls', false, '点击此处上传CSV数据文件（包含关键词、展现、点击等列）');
        });
        
        document.getElementById('uploadBtnSearch').addEventListener('click', () => {
            pendingIntent = 'analyzeSearchTerms';
            addAssistantText('好的，请上传搜索词数据 👇');
            addUploadPrompt('analyzeSearchTerms', '.csv,.xlsx,.xls', false, '点击此处上传CSV文件（包含搜索词、关键词等列）');
        });
        
        document.getElementById('uploadBtnTuoci').addEventListener('click', () => {
            pendingIntent = 'tuociSystem';
            addAssistantText('好的，请在下方输入框中输入需要拓词的基础关键词词根，<b>每行一个</b>👇<br><small>例如：SEO优化、网站建设、网络营销</small>');
        });
        
        // 拖拽上传支持
        document.addEventListener('dragover', e => {
            const target = e.target.closest('.chat-upload-area');
            if (target) { e.preventDefault(); target.classList.add('drag-over'); }
        });
        document.addEventListener('dragleave', e => {
            const target = e.target.closest('.chat-upload-area');
            if (target) target.classList.remove('drag-over');
        });
        document.addEventListener('drop', e => {
            const target = e.target.closest('.chat-upload-area');
            if (target) {
                e.preventDefault();
                target.classList.remove('drag-over');
                if (e.dataTransfer.files.length > 0) {
                    handleFileUpload(e.dataTransfer.files);
                }
            }
        });
        
        // ============================================================
        // 12. 初始化
        // ============================================================
        renderNavMenu();
        initAI();
        initPanelDivider();

        document.getElementById('aiStatusText').addEventListener('click', function() {
            if (this.classList.contains('clickable')) {
                retryLoadAI();
            }
        });
    </script>
