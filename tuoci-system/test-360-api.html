<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>测试360热词API</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; padding: 20px; max-width: 1000px; margin: 0 auto; }
        input { padding: 10px; font-size: 16px; width: 300px; border: 2px solid #e2e8f0; border-radius: 8px; }
        button { padding: 10px 24px; font-size: 16px; background: #667eea; color: white; border: none; border-radius: 8px; cursor: pointer; margin-left: 10px; }
        button:hover { background: #5a67d8; }
        .result-section { margin: 20px 0; padding: 20px; border-radius: 12px; }
        .baidu { background: #fef2f2; border: 1px solid #fee2e2; }
        .baidu h3 { color: #dc2626; margin: 0 0 15px 0; }
        .qihu { background: #eff6ff; border: 1px solid #dbeafe; }
        .qihu h3 { color: #2563eb; margin: 0 0 15px 0; }
        .word-item { display: inline-block; padding: 6px 12px; background: white; border-radius: 20px; margin: 5px; font-size: 14px; }
        .baidu .word-item { border: 1px solid #fee2e2; }
        .qihu .word-item { border: 1px solid #dbeafe; }
        .error { color: #dc2626; }
        .success { color: #16a34a; }
        .api-url { font-family: monospace; font-size: 12px; color: #64748b; margin-top: 10px; word-break: break-all; }
    </style>
</head>
<body>
    <h1>🔍 测试百度/360热词API (JSONP方式)</h1>
    <p style="color:#64748b;">直接测试前端JSONP调用是否能成功获取真实数据</p>
    
    <div style="margin:20px 0;">
        <input type="text" id="keyword" value="SEO优化" placeholder="输入关键词">
        <button onclick="testAll()">全部测试</button>
        <button onclick="testBaiduOnly()">只测百度</button>
        <button onclick="test360Only()">只测360</button>
        <button onclick="clearResults()">清空</button>
    </div>

    <div id="results"></div>
    <div id="log" style="margin-top:20px; padding:15px; background:#f1f5f9; border-radius:8px; font-family:monospace; font-size:12px; white-space:pre-wrap;"></div>

    <script>
        function log(msg) {
            const logDiv = document.getElementById('log');
            const time = new Date().toLocaleTimeString();
            logDiv.textContent += `[${time}] ${msg}\n`;
            console.log(msg);
        }

        function jsonp(url, timeoutMs = 5000) {
            return new Promise((resolve, reject) => {
                const callbackName = 'jsonp_cb_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5);
                const script = document.createElement('script');
                const fullUrl = url.replace('{callback}', callbackName);
                log(`JSONP URL: ${fullUrl}`);
                
                let done = false;
                
                window[callbackName] = function(data) {
                    done = true;
                    delete window[callbackName];
                    document.head.removeChild(script);
                    log(`JSONP 回调成功，数据类型: ${typeof data}`);
                    resolve(data);
                };
                
                script.src = fullUrl;
                script.onerror = function() {
                    if (done) return;
                    done = true;
                    delete window[callbackName];
                    document.head.removeChild(script);
                    log(`JSONP script.onerror 触发`);
                    reject(new Error('JSONP 请求失败 (script error)'));
                };
                
                document.head.appendChild(script);
                
                setTimeout(() => {
                    if (!done) {
                        done = true;
                        delete window[callbackName];
                        document.head.removeChild(script);
                        log(`JSONP 超时 (${timeoutMs}ms)`);
                        reject(new Error(`JSONP 超时 (${timeoutMs}ms)`));
                    }
                }, timeoutMs);
            });
        }

        async function testBaidu(keyword) {
            log(`\n=== 开始测试百度 API ===`);
            try {
                const data = await jsonp('https://suggestion.baidu.com/su?wd=' + encodeURIComponent(keyword) + '&ie=utf-8&cb={callback}');
                const words = (data && data.s) || [];
                log(`百度成功! 获取到 ${words.length} 个热词`);
                return { source: 'baidu', success: true, words: words, data: data };
            } catch (e) {
                log(`百度失败: ${e.message}`);
                return { source: 'baidu', success: false, error: e.message };
            }
        }

        async function test360(keyword) {
            log(`\n=== 开始测试360 API ===`);
            try {
                const data = await jsonp('https://sug.so.360.cn/suggest?word=' + encodeURIComponent(keyword) + '&callback={callback}');
                let words = [];
                if (data && data.result && Array.isArray(data.result)) {
                    words = data.result.map(item => item.word);
                }
                log(`360成功! 获取到 ${words.length} 个热词`);
                return { source: '360', success: true, words: words, data: data };
            } catch (e) {
                log(`360失败: ${e.message}`);
                return { source: '360', success: false, error: e.message };
            }
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function renderResults(results) {
            const html = results.map(r => {
                if (r.success) {
                    const className = r.source === 'baidu' ? 'baidu' : 'qihu';
                    const title = r.source === 'baidu' ? '🌐 百度搜索下拉热词' : '🔷 360搜索下拉热词';
                    const apiUrl = r.source === 'baidu' 
                        ? `https://suggestion.baidu.com/su?wd=${encodeURIComponent(document.getElementById('keyword').value)}`
                        : `https://sug.so.360.cn/suggest?word=${encodeURIComponent(document.getElementById('keyword').value)}`;
                    return `
                        <div class="result-section ${className}">
                            <h3>${title} <span class="success">(成功, ${r.words.length} 个词)</span></h3>
                            <div>${r.words.map(w => `<span class="word-item">${escapeHtml(w)}</span>`).join('')}</div>
                            <div class="api-url">API: ${apiUrl}</div>
                        </div>
                    `;
                } else {
                    return `
                        <div class="result-section ${r.source === 'baidu' ? 'baidu' : 'qihu'}">
                            <h3>${r.source === 'baidu' ? '🌐 百度' : '🔷 360'} <span class="error">(失败)</span></h3>
                            <p class="error">错误: ${escapeHtml(r.error)}</p>
                        </div>
                    `;
                }
            }).join('');
            document.getElementById('results').innerHTML = html;
        }

        async function testAll() {
            const keyword = document.getElementById('keyword').value.trim();
            if (!keyword) { alert('请输入关键词'); return; }
            document.getElementById('log').textContent = '';
            log(`开始测试关键词: "${keyword}"`);
            
            const [baiduResult, qihuResult] = await Promise.all([
                testBaidu(keyword),
                test360(keyword)
            ]);
            renderResults([baiduResult, qihuResult]);
            log(`\n=== 测试完成 ===`);
        }

        async function testBaiduOnly() {
            const keyword = document.getElementById('keyword').value.trim();
            if (!keyword) { alert('请输入关键词'); return; }
            document.getElementById('log').textContent = '';
            log(`开始测试关键词: "${keyword}"`);
            const result = await testBaidu(keyword);
            renderResults([result]);
            log(`\n=== 测试完成 ===`);
        }

        async function test360Only() {
            const keyword = document.getElementById('keyword').value.trim();
            if (!keyword) { alert('请输入关键词'); return; }
            document.getElementById('log').textContent = '';
            log(`开始测试关键词: "${keyword}"`);
            const result = await test360(keyword);
            renderResults([result]);
            log(`\n=== 测试完成 ===`);
        }

        function clearResults() {
            document.getElementById('results').innerHTML = '';
            document.getElementById('log').textContent = '';
        }
    </script>
</body>
</html>
