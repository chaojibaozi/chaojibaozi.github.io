<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一键抠图系统 - AI 智能背景移除</title>
    <script src="https://cdn.tailwindcss.com/3.4.14"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles/common.css">

    <style>
        :root {
            --primary-color: #3b82f6;
            --primary-hover: #2563eb;
            --success-color: #10b981;
            --error-color: #ef4444;
            --warning-color: #f59e0b;
            --bg-light: #ffffff;
            --bg-dark: #1f2937;
            --card-light: #ffffff;
            --card-dark: #374151;
            --text-light: #1f2937;
            --text-dark: #e5e7eb;
        }

        .dark {
            --bg-light: #1f2937;
            --bg-dark: #111827;
            --card-light: #374151;
            --card-dark: #4b5563;
            --text-light: #e5e7eb;
            --text-dark: #f3f4f6;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .upload-zone {
            border: 2px dashed var(--primary-color);
            transition: all 0.3s ease;
        }

        .upload-zone:hover,
        .upload-zone.dragover {
            border-color: var(--primary-hover);
            background-color: rgba(59, 130, 246, 0.1);
        }

        .upload-zone.dragover {
            transform: scale(1.02);
        }

        .progress-bar {
            transition: width 0.3s ease;
        }

        .preview-container {
            overflow: hidden;
            position: relative;
        }

        .preview-image {
            cursor: move;
            transition: transform 0.1s ease-out;
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: white;
            padding: 10px 24px;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.2s ease;
            border: none;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary:hover:not(:disabled) {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary {
            background-color: transparent;
            color: var(--primary-color);
            padding: 10px 24px;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.2s ease;
            border: 2px solid var(--primary-color);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-secondary:hover {
            background-color: rgba(59, 130, 246, 0.1);
        }

        .btn-success {
            background-color: var(--success-color);
            color: white;
            padding: 10px 24px;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.2s ease;
            border: none;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-success:hover:not(:disabled) {
            background-color: #059669;
            transform: translateY(-1px);
        }

        .btn-danger {
            background-color: var(--error-color);
            color: white;
            padding: 10px 24px;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.2s ease;
            border: none;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-danger:hover {
            background-color: #dc2626;
        }

        .card {
            background-color: var(--card-light);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            transition: background-color 0.3s;
        }

        .spinner {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .fade-in {
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .slide-up {
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .toast {
            animation: slideIn 0.3s ease-out, fadeOut 0.3s ease-in 2.7s forwards;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(100%); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }

        .bg-pattern-1 {
            background-image: linear-gradient(45deg, #667eea 0%, #764ba2 100%);
        }

        .bg-pattern-2 {
            background-image: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .bg-pattern-3 {
            background-image: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        .bg-pattern-4 {
            background-image: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
        }

        .bg-pattern-5 {
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%239C92AC' fill-opacity='0.4'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            background-color: #f5f5f5;
        }

        .bg-pattern-6 {
            background-image: radial-gradient(circle, #ffecd2 0%, #fcb69f 100%);
        }

        .color-picker-input {
            -webkit-appearance: none;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 8px;
            cursor: pointer;
            overflow: hidden;
        }

        .color-picker-input::-webkit-color-swatch-wrapper {
            padding: 0;
        }

        .color-picker-input::-webkit-color-swatch {
            border: none;
            border-radius: 8px;
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: #e5e7eb;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--primary-color);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.1);
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
        }
    </style>
</head>
<body class="min-h-screen">
    <nav class="bg-white dark:bg-gray-800 shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">

                    <div class="w-8 h-8 bg-blue-500 rounded-lg flex items-center justify-center">

            <div class="card p-4">

                            <div class="grid grid-cols-4 gap-1.5">
                                <button class="bg-white border-2 border-transparent rounded-lg p-1.5 hover:border-blue-500 transition-colors bg-preview-btn" data-bg="transparent">

                                </button>
                                <button class="bg-white border-2 border-transparent rounded-lg p-1.5 hover:border-blue-500 transition-colors bg-preview-btn" data-bg="color">
                                    <input type="color" class="color-picker-input w-full h-6" id="bg-color-picker" value="#ffffff">
                                </button>
                                <button class="bg-white border-2 border-transparent rounded-lg p-1.5 hover:border-blue-500 transition-colors bg-preview-btn active" data-bg="gradient" style="background: linear-gradient(45deg, #667eea 0%, #764ba2 100%);">

                                    <div class="w-full h-6 rounded bg-pattern-5"></div>

                            </div>
                        </div>

                        <div>
                            <label class="text-xs font-medium text-gray-600 dark:text-gray-300 mb-1.5 block">预设背景</label>

                                <button class="bg-pattern-1 rounded-lg p-1.5 hover:scale-105 transition-transform preset-bg-btn" data-preset="pattern-1"></button>
                                <button class="bg-pattern-2 rounded-lg p-1.5 hover:scale-105 transition-transform preset-bg-btn" data-preset="pattern-2"></button>
                                <button class="bg-pattern-3 rounded-lg p-1.5 hover:scale-105 transition-transform preset-bg-btn" data-preset="pattern-3"></button>
                                <button class="bg-pattern-4 rounded-lg p-1.5 hover:scale-105 transition-transform preset-bg-btn" data-preset="pattern-4"></button>
                                <button class="bg-pattern-5 rounded-lg p-1.5 hover:scale-105 transition-transform preset-bg-btn" data-preset="pattern-5"></button>
                                <button class="bg-pattern-6 rounded-lg p-1.5 hover:scale-105 transition-transform preset-bg-btn" data-preset="pattern-6"></button>
                            </div>

                        <div>
                            <label class="text-xs font-medium text-gray-600 dark:text-gray-300 mb-1.5 block">

                    </div>
                    <p class="text-gray-500 dark:text-gray-400 text-sm">上传图片后在此查看抠图结果</p>

            </div>

        <div class="mt-4 card p-4">
            <h2 class="text-base font-semibold text-gray-800 dark:text-gray-100 mb-3 flex items-center gap-2">
                <i class="fa-solid fa-info-circle text-blue-500"></i>

            </h2>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-3">

                        <i class="fa-solid fa-upload text-blue-500"></i>
                    </div>
                    <h3 class="font-medium text-gray-800 dark:text-gray-200 text-sm">上传图片</h3>
                    <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">拖拽或点击上传图片</p>
                </div>
                <div class="text-center p-3">
                    <div class="w-10 h-10 bg-green-100 dark:bg-green-900/30 rounded-full flex items-center justify-center mx-auto mb-2">
                        <i class="fa-solid fa-magic text-green-500"></i>
                    </div>
                    <h3 class="font-medium text-gray-800 dark:text-gray-200 text-sm">一键抠图</h3>
                    <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">AI 自动识别并移除背景</p>
                </div>
                <div class="text-center p-3">
                    <div class="w-10 h-10 bg-purple-100 dark:bg-purple-900/30 rounded-full flex items-center justify-center mx-auto mb-2">
                        <i class="fa-solid fa-palette text-purple-500"></i>
                    </div>
                    <h3 class="font-medium text-gray-800 dark:text-gray-200 text-sm">调整背景</h3>
                    <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">自定义背景颜色或样式</p>
                </div>
                <div class="text-center p-3">
                    <div class="w-10 h-10 bg-orange-100 dark:bg-orange-900/30 rounded-full flex items-center justify-center mx-auto mb-2">

                <p class="text-gray-500 dark:text-gray-400 text-xs">

                <div class="flex gap-3">
                    <a href="#" class="text-gray-500 dark:text-gray-400 text-xs hover:text-blue-500 transition-colors">使用条款</a>

    <div id="toast-container" class="fixed bottom-4 right-4 z-50 space-y-2"></div>

    <script>
        (function() {
            const MAX_FILE_SIZE = 10 * 1024 * 1024;
            const SUPPORTED_FORMATS = ['image/jpeg', 'image/png', 'image/webp'];

            let originalImage = null;
            let resultImage = null;
            let currentZoom = 1;
            let currentPan = { x: 0, y: 0 };
            let isDragging = false;
            let dragStart = { x: 0, y: 0 };
            let isDarkMode = false;
            let currentBgMode = 'transparent';
            let currentBgColor = '#ffffff';
            let currentBgPattern = '';

            const elements = {
                themeToggle: document.getElementById('theme-toggle'),
                themeIcon: document.getElementById('theme-icon'),
                uploadZone: document.getElementById('upload-zone'),
                fileInput: document.getElementById('file-input'),
                previewSection: document.getElementById('preview-section'),
                originalImage: document.getElementById('original-image'),
                fileInfo: document.getElementById('file-info'),
                clearImage: document.getElementById('clear-image'),
                progressSection: document.getElementById('progress-section'),
                progressBar: document.getElementById('progress-bar'),
                progressText: document.getElementById('progress-text'),
                removeBgBtn: document.getElementById('remove-bg-btn'),
                resultSection: document.getElementById('result-section'),
                resultContainer: document.getElementById('result-container'),
                resultImage: document.getElementById('result-image'),
                emptyState: document.getElementById('empty-state'),
                showOriginal: document.getElementById('show-original'),
                showResult: document.getElementById('show-result'),
                bgColorPicker: document.getElementById('bg-color-picker'),
                zoomSlider: document.getElementById('zoom-slider'),
                zoomValue: document.getElementById('zoom-value'),
                smoothSlider: document.getElementById('smooth-slider'),
                smoothValue: document.getElementById('smooth-value'),
                downloadBtn: document.getElementById('download-btn'),
                resetBtn: document.getElementById('reset-btn'),
                toastContainer: document.getElementById('toast-container'),
                bgPreviewBtns: document.querySelectorAll('.bg-preview-btn'),
                presetBgBtns: document.querySelectorAll('.preset-bg-btn')
            };

            function init() {
                loadTheme();
                bindEvents();
            }

            function loadTheme() {
                isDarkMode = localStorage.getItem('darkMode') === 'true';
                if (isDarkMode) {
                    document.body.classList.add('dark');
                    elements.themeIcon.classList.remove('fa-moon');
                    elements.themeIcon.classList.add('fa-sun');
                }
            }

            function bindEvents() {
                elements.themeToggle.addEventListener('click', toggleTheme);
                elements.uploadZone.addEventListener('click', triggerFileInput);
                elements.uploadZone.addEventListener('dragover', handleDragOver);
                elements.uploadZone.addEventListener('dragleave', handleDragLeave);
                elements.uploadZone.addEventListener('drop', handleDrop);
                elements.fileInput.addEventListener('change', handleFileSelect);
                elements.clearImage.addEventListener('click', clearImage);
                elements.removeBgBtn.addEventListener('click', removeBackground);
                elements.showOriginal.addEventListener('click', showOriginalImage);
                elements.showResult.addEventListener('click', showResultImage);
                elements.bgColorPicker.addEventListener('input', handleBgColorChange);
                elements.zoomSlider.addEventListener('input', handleZoomChange);
                elements.smoothSlider.addEventListener('input', handleSmoothChange);
                elements.downloadBtn.addEventListener('click', downloadImage);
                elements.resetBtn.addEventListener('click', resetAll);

                elements.bgPreviewBtns.forEach(btn => {
                    btn.addEventListener('click', handleBgModeChange);
                });

                elements.presetBgBtns.forEach(btn => {
                    btn.addEventListener('click', handlePresetBgChange);
                });

                elements.resultContainer.addEventListener('mousedown', startDrag);
                elements.resultContainer.addEventListener('mousemove', handleDrag);
                elements.resultContainer.addEventListener('mouseup', stopDrag);
                elements.resultContainer.addEventListener('mouseleave', stopDrag);
                elements.resultContainer.addEventListener('wheel', handleWheelZoom);
                
                elements.resultContainer.addEventListener('touchstart', startDrag, { passive: false });
                elements.resultContainer.addEventListener('touchmove', handleDrag, { passive: false });
                elements.resultContainer.addEventListener('touchend', stopDrag);
                elements.resultContainer.addEventListener('touchcancel', stopDrag);
            }

            function toggleTheme() {
                isDarkMode = !isDarkMode;
                document.body.classList.toggle('dark', isDarkMode);
                localStorage.setItem('darkMode', isDarkMode);
                
                if (isDarkMode) {
                    elements.themeIcon.classList.remove('fa-moon');
                    elements.themeIcon.classList.add('fa-sun');
                } else {
                    elements.themeIcon.classList.remove('fa-sun');
                    elements.themeIcon.classList.add('fa-moon');
                }
            }

            function triggerFileInput() {
                elements.fileInput.click();
            }

            function handleDragOver(e) {
                e.preventDefault();
                elements.uploadZone.classList.add('dragover');
            }

            function handleDragLeave(e) {
                e.preventDefault();
                elements.uploadZone.classList.remove('dragover');
            }

            function handleDrop(e) {
                e.preventDefault();
                elements.uploadZone.classList.remove('dragover');
                
                const files = e.dataTransfer.files;
                if (files.length > 0) {
                    processFile(files[0]);
                }
            }

            function handleFileSelect(e) {
                const files = e.target.files;
                if (files.length > 0) {
                    processFile(files[0]);
                }
            }

            function processFile(file) {
                if (!SUPPORTED_FORMATS.includes(file.type)) {
                    showToast('error', '不支持的文件格式，请上传 JPG、PNG 或 WebP 格式');
                    return;
                }

                if (file.size > MAX_FILE_SIZE) {
                    showToast('error', '文件大小超过限制，最大支持 10MB');
                    return;
                }

                const reader = new FileReader();
                reader.onload = function(e) {
                    originalImage = e.target.result;
                    elements.originalImage.src = originalImage;
                    elements.fileInfo.textContent = `${file.name} - ${formatFileSize(file.size)}`;
                    
                    elements.uploadZone.classList.add('hidden');
                    elements.previewSection.classList.remove('hidden');
                    elements.removeBgBtn.classList.remove('hidden');
                    elements.resultSection.classList.add('hidden');
                    elements.emptyState.classList.remove('hidden');
                };
                reader.readAsDataURL(file);
            }

            function formatFileSize(bytes) {
                if (bytes < 1024) return bytes + ' B';
                if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
                return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
            }

            function clearImage() {
                originalImage = null;
                resultImage = null;
                elements.fileInput.value = '';
                elements.uploadZone.classList.remove('hidden');
                elements.previewSection.classList.add('hidden');
                elements.removeBgBtn.classList.add('hidden');
                elements.progressSection.classList.add('hidden');
                elements.resultSection.classList.add('hidden');
                elements.emptyState.classList.remove('hidden');
                resetZoomAndPan();
            }

            async function removeBackground() {
                if (!originalImage) return;

                elements.removeBgBtn.disabled = true;
                elements.progressSection.classList.remove('hidden');
                elements.resultSection.classList.add('hidden');
                elements.emptyState.classList.remove('hidden');
                
                elements.progressBar.style.width = '0%';
                elements.progressText.textContent = '正在处理图片...';

                try {
                    const image = new Image();
                    image.src = originalImage;
                    await new Promise((resolve, reject) => {
                        image.onload = resolve;
                        image.onerror = reject;
                    });

                    const smoothValue = parseInt(elements.smoothSlider.value);
                    
                    const MAX_PROC_PIXELS = 400 * 400;
                    const scale = Math.min(1, Math.sqrt(MAX_PROC_PIXELS / (image.width * image.height)));
                    const procW = Math.round(image.width * scale);
                    const procH = Math.round(image.height * scale);

                    const procCanvas = document.createElement('canvas');
                    procCanvas.width = procW;
                    procCanvas.height = procH;
                    const procCtx = procCanvas.getContext('2d');
                    procCtx.drawImage(image, 0, 0, procW, procH);
                    const procData = procCtx.getImageData(0, 0, procW, procH);
                    const procPixels = procData.data;

                    elements.progressBar.style.width = '15%';
                    elements.progressText.textContent = '正在提取边缘特征...';
                    
                    const edgeMap = computeEdgeMap(procPixels, procW, procH);

                    elements.progressBar.style.width = '30%';
                    elements.progressText.textContent = '正在计算显著性...';
                    
                    const saliencyMap = computeSaliencyMap(procPixels, procW, procH, edgeMap);

                    elements.progressBar.style.width = '45%';
                    elements.progressText.textContent = '正在识别主体区域...';
                    
                    const subjectMask = findSubjectRegion(saliencyMap, edgeMap, procW, procH);

                    elements.progressBar.style.width = '60%';
                    elements.progressText.textContent = '正在优化遮罩...';
                    
                    const refinedMask = refineSubjectMask(subjectMask, procW, procH);

                    const fullCanvas = document.createElement('canvas');
                    fullCanvas.width = image.width;
                    fullCanvas.height = image.height;
                    const fullCtx = fullCanvas.getContext('2d');
                    
                    fullCtx.clearRect(0, 0, image.width, image.height);
                    
                    fullCtx.drawImage(image, 0, 0);
                    const fullData = fullCtx.getImageData(0, 0, image.width, image.height);

                    elements.progressBar.style.width = '80%';
                    elements.progressText.textContent = '正在应用遮罩...';
                    
                    applySubjectMask(fullData.data, image.width, image.height, refinedMask, procW, procH, scale);

                    const featherRadius = Math.max(1, Math.round(smoothValue / 10));
                    featherEdges(fullData.data, image.width, image.height, featherRadius);

                    fullCtx.putImageData(fullData, 0, 0);

                    elements.progressBar.style.width = '95%';
                    elements.progressText.textContent = '正在生成结果...';

                    resultImage = fullCanvas.toDataURL('image/png');
                    elements.resultImage.src = resultImage;

                    elements.progressBar.style.width = '100%';
                    elements.progressText.textContent = '处理完成';

                    setTimeout(() => {
                        elements.progressSection.classList.add('hidden');
                        elements.emptyState.classList.add('hidden');
                        elements.resultSection.classList.remove('hidden');
                        elements.removeBgBtn.disabled = false;
                        resetZoomAndPan();
                        updateResultContainerBg();
                        showToast('success', '抠图完成！');
                    }, 500);

                } catch (error) {
                    console.error('抠图失败:', error);
                    elements.progressSection.classList.add('hidden');
                    elements.removeBgBtn.disabled = false;
                    showToast('error', '抠图失败: ' + error.message);
                }
            }

            function computeEdgeMap(pixels, w, h) {
                const edgeMap = new Uint8Array(w * h);
                
                for (let y = 1; y < h - 1; y++) {
                    for (let x = 1; x < w - 1; x++) {
                        const idx = (y * w + x) * 4;
                        
                        const gx = 
                            -getGray(pixels, x - 1, y - 1, w) 
                            -2 * getGray(pixels, x - 1, y, w) 
                            -getGray(pixels, x - 1, y + 1, w) 
                            +getGray(pixels, x + 1, y - 1, w) 
                            +2 * getGray(pixels, x + 1, y, w) 
                            +getGray(pixels, x + 1, y + 1, w);
                        
                        const gy = 
                            -getGray(pixels, x - 1, y - 1, w) 
                            -2 * getGray(pixels, x, y - 1, w) 
                            -getGray(pixels, x + 1, y - 1, w) 
                            +getGray(pixels, x - 1, y + 1, w) 
                            +2 * getGray(pixels, x, y + 1, w) 
                            +getGray(pixels, x + 1, y + 1, w);
                        
                        const magnitude = Math.sqrt(gx * gx + gy * gy);
                        edgeMap[y * w + x] = Math.min(255, Math.round(magnitude));
                    }
                }
                return edgeMap;
            }

            function getGray(pixels, x, y, w) {
                const idx = (y * w + x) * 4;
                return Math.round(pixels[idx] * 0.299 + pixels[idx + 1] * 0.587 + pixels[idx + 2] * 0.114);
            }

            function computeSaliencyMap(pixels, w, h, edgeMap) {
                const saliency = new Float32Array(w * h);
                const centerX = w / 2;
                const centerY = h / 2;
                const maxDist = Math.sqrt(centerX * centerX + centerY * centerY);

                const gray = new Uint8Array(w * h);
                for (let i = 0; i < w * h; i++) {
                    const idx = i * 4;
                    gray[i] = Math.round(pixels[idx] * 0.299 + pixels[idx + 1] * 0.587 + pixels[idx + 2] * 0.114);
                }

                let sumGray = 0, sumR = 0, sumG = 0, sumB = 0;
                for (let i = 0; i < w * h; i++) {
                    const idx = i * 4;
                    sumGray += gray[i];
                    sumR += pixels[idx];
                    sumG += pixels[idx + 1];
                    sumB += pixels[idx + 2];
                }
                const avgGray = sumGray / (w * h);
                const avgR = sumR / (w * h);
                const avgG = sumG / (w * h);
                const avgB = sumB / (w * h);

                for (let y = 0; y < h; y++) {
                    for (let x = 0; x < w; x++) {
                        const idx = y * w + x;
                        const pxIdx = idx * 4;

                        const dist = Math.sqrt((x - centerX) ** 2 + (y - centerY) ** 2);
                        const centerBias = 1 - (dist / maxDist) * 0.4;

                        const dr = pixels[pxIdx] - avgR;
                        const dg = pixels[pxIdx + 1] - avgG;
                        const db = pixels[pxIdx + 2] - avgB;
                        const colorContrast = Math.sqrt(dr * dr + dg * dg + db * db) / 255;

                        const edgeScore = edgeMap[idx] / 255;

                        saliency[idx] = (colorContrast * 0.3 + edgeScore * 0.4 + centerBias * 0.3);
                    }
                }

                let maxSal = 0;
                for (let i = 0; i < w * h; i++) {
                    if (saliency[i] > maxSal) maxSal = saliency[i];
                }
                for (let i = 0; i < w * h; i++) {
                    saliency[i] = saliency[i] / maxSal;
                }

                return saliency;
            }

            function findSubjectRegion(saliency, edgeMap, w, h) {
                const mask = new Uint8Array(w * h);
                const visited = new Uint8Array(w * h);
                
                let bestScore = -1;
                let bestSeed = { x: Math.floor(w / 2), y: Math.floor(h / 2) };
                
                const sampleStep = Math.max(1, Math.floor(Math.min(w, h) / 8));
                for (let y = sampleStep; y < h - sampleStep; y += sampleStep) {
                    for (let x = sampleStep; x < w - sampleStep; x += sampleStep) {
                        const score = saliency[y * w + x];
                        if (score > bestScore) {
                            bestScore = score;
                            bestSeed = { x, y };
                        }
                    }
                }

                const threshold = 0.3;
                const queue = [bestSeed];
                let qi = 0;
                
                while (qi < queue.length) {
                    const { x, y } = queue[qi];
                    qi++;
                    const idx = y * w + x;
                    
                    if (visited[idx]) continue;
                    visited[idx] = 1;
                    
                    if (saliency[idx] < threshold) continue;
                    
                    mask[idx] = 1;
                    
                    for (let dy = -1; dy <= 1; dy++) {
                        for (let dx = -1; dx <= 1; dx++) {
                            if (dx === 0 && dy === 0) continue;
                            const nx = x + dx;
                            const ny = y + dy;
                            if (nx >= 0 && nx < w && ny >= 0 && ny < h) {
                                queue.push({ x: nx, y: ny });
                            }
                        }
                    }
                }

                return mask;
            }

            function refineSubjectMask(mask, w, h) {
                const result = new Uint8Array(mask);
                
                for (let iter = 0; iter < 2; iter++) {
                    const temp = new Uint8Array(w * h);
                    for (let y = 0; y < h; y++) {
                        for (let x = 0; x < w; x++) {
                            const idx = y * w + x;
                            let count = 0;
                            let total = 0;
                            for (let dy = -2; dy <= 2; dy++) {
                                for (let dx = -2; dx <= 2; dx++) {
                                    const nx = x + dx;
                                    const ny = y + dy;
                                    if (nx >= 0 && nx < w && ny >= 0 && ny < h) {
                                        if (result[ny * w + nx]) count++;
                                        total++;
                                    }
                                }
                            }
                            temp[idx] = count >= total * 0.5 ? 1 : 0;
                        }
                    }
                    for (let i = 0; i < w * h; i++) {
                        result[i] = temp[i];
                    }
                }

                return result;
            }

            function applySubjectMask(pixels, imgW, imgH, subjectMask, maskW, maskH, scale) {
                for (let y = 0; y < imgH; y++) {
                    for (let x = 0; x < imgW; x++) {
                        const mx = Math.min(maskW - 1, Math.max(0, Math.round(x * scale)));
                        const my = Math.min(maskH - 1, Math.max(0, Math.round(y * scale)));
                        const isSubject = subjectMask[my * maskW + mx];
                        const idx = (y * imgW + x) * 4;
                        pixels[idx + 3] = isSubject ? 255 : 0;
                    }
                }
            }

            function featherEdges(pixels, w, h, radius) {
                if (radius < 1) return;
                const temp = new Uint8Array(w * h);

                for (let y = 0; y < h; y++) {
                    for (let x = 0; x < w; x++) {
                        const idx = y * w + x;
                        const pixelIdx = idx * 4;
                        if (pixels[pixelIdx + 3] === 255) {
                            temp[idx] = 255;
                            continue;
                        }
                        let dist = Infinity;
                        for (let dy = -radius; dy <= radius && dist > 0; dy++) {
                            for (let dx = -radius; dx <= radius && dist > 0; dx++) {
                                const nx = x + dx;
                                const ny = y + dy;
                                if (nx >= 0 && nx < w && ny >= 0 && ny < h) {
                                    const ni = (ny * w + nx) * 4;
                                    if (pixels[ni + 3] === 255) {
                                        const d = Math.sqrt(dx * dx + dy * dy);
                                        if (d < dist) dist = d;
                                    }
                                }
                            }
                        }
                        if (dist <= radius) {
                            temp[idx] = Math.round((dist / radius) * 255);
                        } else {
                            temp[idx] = 0;
                        }
                    }
                }

                for (let y = 0; y < h; y++) {
                    for (let x = 0; x < w; x++) {
                        const idx = (y * w + x) * 4;
                        const alpha = temp[y * w + x];
                        if (alpha !== 0 && alpha !== 255) {
                            pixels[idx + 3] = alpha;
                        }
                    }
                }
            }

            function resetZoomAndPan() {
                currentZoom = 1;
                currentPan = { x: 0, y: 0 };
                elements.zoomSlider.value = 100;
                elements.zoomValue.textContent = '100%';
                updateResultImageTransform();
            }

            function updateResultImageTransform() {
                const translateX = currentPan.x / currentZoom;
                const translateY = currentPan.y / currentZoom;
                elements.resultImage.style.transform = `translate(${translateX}px, ${translateY}px) scale(${currentZoom})`;
                elements.resultImage.style.willChange = 'transform';
            }

            function showOriginalImage() {
                if (originalImage) {
                    elements.resultImage.src = originalImage;
                    elements.showOriginal.classList.add('btn-primary');
                    elements.showOriginal.classList.remove('btn-secondary');
                    elements.showResult.classList.add('btn-secondary');
                    elements.showResult.classList.remove('btn-primary');
                }
            }

            function showResultImage() {
                if (resultImage) {
                    elements.resultImage.src = resultImage;
                    elements.showResult.classList.add('btn-primary');
                    elements.showResult.classList.remove('btn-secondary');
                    elements.showOriginal.classList.add('btn-secondary');
                    elements.showOriginal.classList.remove('btn-primary');
                }
            }

            function handleBgModeChange(e) {
                const bgMode = e.currentTarget.dataset.bg;
                
                elements.bgPreviewBtns.forEach(btn => btn.classList.remove('active'));
                e.currentTarget.classList.add('active');
                
                currentBgMode = bgMode;
                updateResultContainerBg();
            }

            function handleBgColorChange(e) {
                currentBgColor = e.target.value;
                if (currentBgMode === 'color') {
                    updateResultContainerBg();
                }
            }

            function handlePresetBgChange(e) {
                const preset = e.currentTarget.dataset.preset;
                currentBgPattern = preset;
                currentBgMode = 'pattern';
                
                elements.bgPreviewBtns.forEach(btn => btn.classList.remove('active'));
                document.querySelector('[data-bg="pattern"]').classList.add('active');
                
                updateResultContainerBg();
            }

            function updateResultContainerBg() {
                switch (currentBgMode) {
                    case 'transparent':
                        elements.resultContainer.style.background = 'linear-gradient(45deg, #ddd 25%, transparent 25%), linear-gradient(-45deg, #ddd 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #ddd 75%), linear-gradient(-45deg, transparent 75%, #ddd 75%)';
                        elements.resultContainer.style.backgroundSize = '20px 20px';
                        elements.resultContainer.style.backgroundPosition = '0 0, 0 10px, 10px -10px, -10px 0px';
                        break;
                    case 'color':
                        elements.resultContainer.style.background = currentBgColor;
                        break;
                    case 'gradient':
                        elements.resultContainer.style.background = 'linear-gradient(45deg, #667eea 0%, #764ba2 100%)';
                        break;
                    case 'pattern':
                        elements.resultContainer.className = `preview-container bg-${currentBgPattern} rounded-xl overflow-hidden`;
                        elements.resultContainer.style.background = `var(--tw-gradient-stops)`;
                        break;
                }
            }

            function handleZoomChange(e) {
                currentZoom = parseInt(e.target.value) / 100;
                elements.zoomValue.textContent = `${e.target.value}%`;
                updateResultImageTransform();
            }

            function handleSmoothChange(e) {
                elements.smoothValue.textContent = `${e.target.value}%`;
            }

            function handleWheelZoom(e) {
                e.preventDefault();
                const delta = e.deltaY > 0 ? -0.1 : 0.1;
                const newZoom = Math.max(0.5, Math.min(2, currentZoom + delta));
                
                if (newZoom !== currentZoom) {
                    currentZoom = newZoom;
                    elements.zoomSlider.value = Math.round(currentZoom * 100);
                    elements.zoomValue.textContent = `${elements.zoomSlider.value}%`;
                    updateResultImageTransform();
                }
            }

            function startDrag(e) {
                isDragging = true;
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                dragStart = {
                    x: clientX - currentPan.x,
                    y: clientY - currentPan.y
                };
                elements.resultImage.style.cursor = 'grabbing';
                e.preventDefault();
            }

            function handleDrag(e) {
                if (!isDragging) return;
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                
                currentPan = {
                    x: clientX - dragStart.x,
                    y: clientY - dragStart.y
                };
                
                requestAnimationFrame(() => {
                    updateResultImageTransform();
                });
                
                if (e.touches) {
                    e.preventDefault();
                }
            }

            function stopDrag() {
                isDragging = false;
                elements.resultImage.style.cursor = 'grab';
            }

            function downloadImage() {
                if (!resultImage) return;

                const link = document.createElement('a');
                link.href = resultImage;
                link.download = 'removed-background.png';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }

            function resetAll() {
                clearImage();
            }

            function showToast(type, message) {
                const toast = document.createElement('div');
                toast.className = `toast flex items-center gap-3 px-4 py-3 rounded-lg shadow-lg ${
                    type === 'success' ? 'bg-green-500 text-white' : 'bg-red-500 text-white'
                }`;
                
                const icon = document.createElement('i');
                icon.className = type === 'success' ? 'fa-solid fa-check-circle' : 'fa-solid fa-exclamation-circle';
                
                const text = document.createElement('span');
                text.textContent = message;
                
                toast.appendChild(icon);
                toast.appendChild(text);
                
                elements.toastContainer.appendChild(toast);
                
                setTimeout(() => {
                    toast.remove();
                }, 3000);
            }

            init();
        })();
    </script>
</body>
</html>
